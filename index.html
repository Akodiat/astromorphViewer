<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="main.css">
    <title>Astromorph viewer</title>


    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.181.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>


    <canvas id="spriteCanvas"></canvas>

    <div class="contentBox">

      <header class="clickable container">
        <h1>Astromorph viewer</h1>
        <details open id="inputData">
          <summary>Input data</summary>
          <article>
            <div class="grid">


              <label>
                Random seed
                <input type="number" id="seed" aria-label="Random seed">
                <small id="seed">
                  Input a seed to get reproducable UMAP results
                </small>
              </label>

              <label>
                Input CSV file
                <input type="file" id="csvInput" accept=".csv" aria-describedby="csvInputHelper">
                <small id="csvInputHelper">
                  Input a CSV file with cluster, filepath, and embedding columns
                </small>
                <progress id="umapProgress" hidden></progress>
              </label>

              <label>
                Input FITS files
                <input type="file" id="fitsInput" multiple="multiple" accept=".fits" aria-describedby="fitsInputHelper">
                <small id="fitsInputHelper">
                  Select all fits files referenced by the csv file
                </small>
              </label>

              <fieldset>
                <legend>UMAP dimensions</legend>
                <label>
                  <input type="radio" value="2" name="umapDimensions" checked/>
                  2D
                </label>
                <label>
                  <input type="radio" value="3" name="umapDimensions"/>
                  3D
                </label>
              </fieldset>
            </div>
          </article>
        </details>

        <progress id="mapProgress" hidden></progress>
      </header>

      <main>
        <article>
          <details open id="viewOptions" hidden class="clickable">
            <summary>Options</summary>
              <label>
                Scaling factor
                <input type="number" id="mapScalingFactor" aria-label="Scaling factor" value="0.25" step="0.1" aria-describedby="mapScalingFactorHelper" title="Increase to place images further apart" style="max-width: 10em;">
              </label>
              <label>
                Color scheme
                <select id="colorScheme">
                  <option value="viridis">Viridis</option>
                  <option value="GnBu">GnBu</option>
                  <option value="PuRd">PuRd</option>
                  <option value="YlGnBu">YlGnBu</option>
                  <option value="grayscale">Grayscale</option>
              </select>
              </label>
          </details>
          <details id="selectionInfo" hidden>
            <summary class="clickable">Selection info</summary>
            <canvas id="imageCanvas" style="min-height: 300px;" class="clickable"></canvas>
            <small>
              <table id="textData" class="clickable"></table>
            </small>
          </details>
        </article>
      </main>

      <footer>
        <small>
          Created by Joakim Bohlin (Infravis)
        </small>
      </footer>

    </div>

    <script src="lib/fits.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
